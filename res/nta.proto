// NTA enriched API — our own schemas, not standard GTFS-RT.
//
// The NTA GTFS-Realtime feeds expose only IDs. This file defines the enriched
// response types returned by this Worker, which join real-time data with the
// NTA static GTFS stored in D1 so clients get everything in one request.
//
// All responses are cached on the Cloudflare edge for 65 seconds (matching the
// NTA feed refresh cadence). Proto bytes are always what gets cached; JSON is
// derived on the fly via the generated toJSON methods.

syntax = "proto3";
package nta;

// ─── Error ──────────────────────────────────────────────────────────────────

// Returned on any error response, regardless of endpoint.
message ErrorResponse {
  uint32 code              = 1; // mirrors the HTTP status code
  string description       = 2;
  string end_user_feedback = 3; // human-friendly message safe to display in a UI
}

// ─── /v1/live/vehicles ─────────────────────────────────────────────────────

// Feed of all currently active vehicles, enriched with human-readable labels.
message VehiclesFeed {
  uint64 timestamp             = 1; // POSIX seconds, from the upstream GTFS-RT header
  repeated VehicleEntity entity = 2;
}

// One vehicle in the enriched feed.
// Fields 1–9 come from the GTFS-RT VehiclePosition message.
// Fields 10–11 are joined from the static GTFS D1 database (trips → routes).
message VehicleEntity {
  string id           = 1; // entity id from the GTFS-RT feed
  string trip_id      = 2;
  string route_id     = 3;
  uint32 direction_id = 4;
  float  latitude     = 5;
  float  longitude    = 6;
  float  bearing      = 7; // degrees clockwise from North
  uint64 timestamp    = 8; // POSIX seconds of the last GPS fix
  string vehicle_id   = 9; // operator's internal vehicle identifier

  string route_short_name = 10; // e.g. "120" — what passengers see on the bus
  string trip_headsign    = 11; // e.g. "Edenderry Town Hall" — destination on the bus
  string agency_id        = 12;
  string agency_name      = 13; // e.g. "Dublin Bus"
}

// ─── /v1/static/stops ───────────────────────────────────────────────────────

// All bus stops from the GTFS static feed.
message StopsFeed {
  string version       = 1; // static data version, e.g. "<feed-uuid>/<ISO-timestamp>"
  repeated Stop stops  = 2;
}

message Stop {
  string stop_id        = 1;
  string stop_code      = 2;
  string stop_name      = 3;
  string stop_desc      = 4;
  float  stop_lat       = 5;
  float  stop_lon       = 6;
  string zone_id        = 7;
  string stop_url       = 8;
  int32  location_type  = 9;
  string parent_station = 10;
}

// ─── /v1/live/stops/{stop_id} ───────────────────────────────────────────────

// All of today's scheduled arrivals at a single stop, with real-time delays.
// Returned by GET /v1/live/stops/{stop_id}.
message StopSchedule {
  string stop_id   = 1;
  string stop_code = 2;
  string stop_name = 3;
  float  stop_lat  = 4;
  float  stop_lon  = 5;
  repeated StopArrival arrivals = 6;
  // POSIX seconds from the NTA TripUpdates feed header.
  // Tells clients how fresh the delay data is. Absent if the feed was unavailable.
  optional uint64 realtime_timestamp = 7;
}

// One scheduled arrival/departure at the stop, with optional real-time delay.
message StopArrival {
  string trip_id             = 1;
  string route_short_name    = 2;
  string trip_headsign       = 3;
  int32  direction_id        = 4;
  int32  stop_sequence       = 5;
  string scheduled_arrival   = 6; // HH:MM:SS; hours may exceed 23 for post-midnight GTFS trips
  string scheduled_departure = 7; // HH:MM:SS; hours may exceed 23 for post-midnight GTFS trips
  string agency_id           = 8; // e.g. "7778" — operator identifier
  // Real-time delay in seconds (positive = late).
  // Absent means no live data for this trip at this stop.
  optional int32 arrival_delay   = 9;
  optional int32 departure_delay = 10;
  // POSIX seconds derived from the GTFS time + Dublin local midnight of the service date.
  // Use these instead of parsing the string fields when you need wall-clock comparisons.
  optional uint64 scheduled_arrival_utc   = 11;
  optional uint64 scheduled_departure_utc = 12;
}

// ─── /v1/live/trips/{trip_id} ───────────────────────────────────────────────

// Full details for a single trip: static GTFS info + real-time stop delays.
// Returned by GET /v1/live/trips/{trip_id}.
message TripDetails {
  string trip_id          = 1;
  string trip_headsign    = 2;
  string trip_short_name  = 3;
  int32  direction_id     = 4;
  string block_id         = 5;
  string shape_id         = 6;
  string route_short_name = 7;
  string route_long_name  = 8;
  int32  route_type       = 9;
  string route_color      = 10;
  string route_text_color = 11;
  string agency_name      = 12;
  string agency_url       = 13;
  repeated ShapePoint shape = 14;
  repeated TripStop   stops = 15;

  // POSIX seconds of the last vehicle progress measurement (from TripUpdate.timestamp).
  // Absent means NTA did not report a measurement time for this trip.
  optional uint64 timestamp = 16;
}

// A single point in the route polyline.
message ShapePoint {
  float lat           = 1;
  float lon           = 2;
  float dist_traveled = 3; // meters along the route from the start
}

// A stop on the trip, with optional real-time delay data.
message TripStop {
  int32  stop_sequence  = 1;
  string stop_id        = 2;
  string stop_code      = 3;
  string stop_name      = 4;
  float  stop_lat       = 5;
  float  stop_lon       = 6;
  string arrival_time   = 7;  // HH:MM:SS scheduled
  string departure_time = 8;  // HH:MM:SS scheduled
  string stop_headsign  = 9;
  int32  pickup_type    = 10;
  int32  drop_off_type  = 11;
  int32  timepoint      = 12;

  // Real-time delay in seconds (positive = late).
  // Absent (not 0) means no live data for this stop — NTA omits past stops.
  optional int32 arrival_delay   = 13;
  optional int32 departure_delay = 14;
}
